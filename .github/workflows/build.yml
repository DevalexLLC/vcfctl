name: build

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load pinned versions
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Build (amd64)
        run: |
          docker buildx build --load \
            --build-arg VCF_CLI_VERSION="$VCF_CLI_VERSION" \
            --build-arg VCF_PLUGIN_BUNDLE_VERSION="$VCF_PLUGIN_BUNDLE_VERSION" \
            --build-arg KUBECTL_VERSION="$KUBECTL_VERSION" \
            -t vcfctl:ci .

      - name: Smoke test
        run: IMAGE=vcfctl:ci ./test/smoke.sh

  push:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load pinned versions
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - name: Compute image tags
        id: tags
        run: |
          # github.repository keeps the org's capitalization (DevalexLLC/...),
          # but registry image names must be lowercase.
          REGISTRY_IMAGE=${REGISTRY_IMAGE,,}
          tags="$REGISTRY_IMAGE:$VCF_CLI_VERSION"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Release tag like v9.0.2-1 -> additional revision tag 9.0.2-1.
            # It must match the version actually being built, or the image
            # would be published under a mislabeled version tag.
            ref_ver=${GITHUB_REF_NAME#v}
            case $ref_ver in
              "$VCF_CLI_VERSION"|"$VCF_CLI_VERSION"-*) ;;
              *)
                echo "::error::release tag $GITHUB_REF_NAME does not match VCF_CLI_VERSION=$VCF_CLI_VERSION in versions.env"
                exit 1
                ;;
            esac
            tags="$tags,$REGISTRY_IMAGE:$ref_ver"
          fi
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tags="$tags,$REGISTRY_IMAGE:latest,$REGISTRY_IMAGE:sha-${GITHUB_SHA::7}"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VCF_CLI_VERSION=${{ env.VCF_CLI_VERSION }}
            VCF_PLUGIN_BUNDLE_VERSION=${{ env.VCF_PLUGIN_BUNDLE_VERSION }}
            KUBECTL_VERSION=${{ env.KUBECTL_VERSION }}
